services:
  # Python Backend Service
  - type: web
    name: multimodal-backend
    env: docker
    plan: starter
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: PORT
        value: 8010
